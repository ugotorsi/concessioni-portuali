name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-build-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/concessioni_test?schema=public
      NEXTAUTH_SECRET: test-secret
      NEXTAUTH_URL: http://localhost:3000
      AUTH_MAX_FAILED_ATTEMPTS: 5
      AUTH_LOCKOUT_MINUTES: 15
      AUTH_PASSWORD_MIN_LENGTH: 10
      RATE_LIMIT_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run unit tests
        run: npm run test

      - name: Run build
        run: npm run build

      - name: Run check
        run: npm run check

  e2e:
    runs-on: ubuntu-latest
    needs: unit-build-check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: concessioni_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d concessioni_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/concessioni_test?schema=public
      NEXTAUTH_SECRET: test-secret
      NEXTAUTH_URL: http://localhost:3000
      CI: true
      AUTH_MAX_FAILED_ATTEMPTS: 5
      AUTH_LOCKOUT_MINUTES: 15
      AUTH_PASSWORD_MIN_LENGTH: 10
      RATE_LIMIT_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push Prisma schema
        run: npm run db:push

      - name: Seed database
        run: npm run db:seed

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
